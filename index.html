<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardwood 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0A08}
#stage{position:relative;width:100%;height:100%}
#gl{position:absolute;left:0;display:block}
#hud{position:absolute;left:0;top:0;display:block;pointer-events:none}
canvas{display:block}
</style>
</head>
<body>
<div id="stage">
  <canvas id="gl"></canvas>
  <canvas id="hud"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ============================================================
// HARDWOOD 3D — Basketball Simulation (Three.js port)
// Simulation logic ported from the 2D canvas original; rendering
// layer rebuilt in true 3D with a tilted broadcast-style camera.
// ============================================================

// ------------------------------------------------------------
// CONFIGURATION (unchanged from original)
// ------------------------------------------------------------
const CFG = {
  COURT_W: 94, COURT_H: 50,
  BASKET_LX: 5.25, BASKET_RX: 88.75, BASKET_Y: 25,
  THREE_PT_R: 23.75, THREE_PT_CORNER: 3,
  PAINT_W: 16, PAINT_L: 19, FT_CIRCLE_R: 6, RESTRICTED_R: 4,
  CENTER_CIRCLE_R: 6, BACKBOARD_OFFSET: 4,
  PLAYER_R: 1.4, PLAYER_SPEED: 16, SPRINT_MULT: 1.25,
  BALL_SPEED_MULT: 0.88, ACCEL: 80, DECEL: 60,
  BALL_R: 0.55, BALL_FRICTION: 0.985, BOUNCE_DAMP: 0.55,
  PICKUP_R: 2.2,
  SHOT_CHARGE_T: 0.9, SWEET_MIN: 0.58, SWEET_MAX: 0.84, SWEET_PERFECT: 0.72,
  SHOT_FLIGHT_SPEED: 38, SHOT_MAX_DIST: 32,
  PASS_SPEED: 34, PASS_INTERCEPT_R: 1.42,
  QUARTERS: 4, QUARTER_TIME: 120, SHOT_CLOCK: 24, SHOT_CLOCK_REBOUND: 14,
  SCORE_DELAY: 1.0, TIP_DELAY: 1.5,
  BASE_AI_SHOOT_RANGE: 24.5, BASE_AI_SHOOT_PROB: 0.019, BASE_AI_PASS_PROB: 0.028,
  BASE_AI_STEAL_R: 2.1, BASE_AI_STEAL_PROB: 0.0085,
  BASE_AI_HELP_R: 10.5, BASE_AI_HELP_SAG: 0.34, BASE_AI_FASTBREAK_BONUS: 0.68,
  BASE_AI_CONTEST_PENALTY: 0.39, BASE_AI_DRIVE_AGGRESSION: 0.76,
  BASE_AI_DEF_TIGHTNESS: 0.92,
  PASS_LANE_SAFETY: 2.3,
  OPEN_THRESHOLD: 4.7,
  REBOUND_R: 9.8, REBOUND_CHANCE_OFF: 0.73, REBOUND_AGGRESSION: 1.28,
  REBOUND_PURSUIT_SPEED_MULT: 1.22,
  STAMINA_MAX: 100, STAMINA_SPRINT_DRAIN: 9, STAMINA_MOVE_DRAIN: 2.5,
  STAMINA_REGEN_IDLE: 6, STAMINA_REGEN_MOVE: 1.2,
  STAMINA_LOW_THRESH: 35, STAMINA_MIN_SPEED_MULT: 0.62, STAMINA_SHOT_PENALTY: 0.22,
  HOT_STREAK_MAX: 4, HOT_STREAK_BONUS: 0.05, HOT_STREAK_DECAY_T: 14,
  FOUL_PROB_STEAL: 0.24, TEAM_FOUL_BONUS: 5, FOUL_OUT_LIMIT: 6,
  FOUL_DEADBALL_T: 1.2, FT_DELAY: 0.8,
  COURT_C1: '#C4893B', COURT_C2: '#B5803A',
  LINE_C: 'rgba(255,255,255,0.82)', PAINT_C: 'rgba(155,45,28,0.22)',
  HOME_C: '#E8A838', AWAY_C: '#2D8B6F',
  BALL_C: '#E87020', UI_BG: 'rgba(12,12,10,0.93)',
  UI_TEXT: '#F0E6D6', UI_ACCENT: '#E8A838', UI_DIM: '#8A7E6E',
  RIM_HEIGHT: 10, BACKBOARD_H: 13,
};

const DIFFICULTIES = {
  EASY:   { name: "Easy",   aiShootMult: 0.75, aiDefenseMult: 0.65, userThreeMult: 1.35, reboundMult: 0.8 },
  NORMAL: { name: "Normal", aiShootMult: 1.0,  aiDefenseMult: 1.0,  userThreeMult: 1.0,  reboundMult: 1.0 },
  HARD:   { name: "Hard",   aiShootMult: 1.25, aiDefenseMult: 1.35, userThreeMult: 0.72, reboundMult: 1.15 },
  EXPERT: { name: "Expert", aiShootMult: 1.45, aiDefenseMult: 1.55, userThreeMult: 0.55, reboundMult: 1.3 }
};
let currentDifficulty = 'NORMAL';

// ------------------------------------------------------------
// UTILITIES
// ------------------------------------------------------------
const {abs,sin,cos,sqrt,PI,min,max,floor,random,atan2,round} = Math;
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return max(lo,min(hi,v))}
function dist(ax,ay,bx,by){return sqrt((bx-ax)**2+(by-ay)**2)}
function rng(lo,hi){return lo+random()*(hi-lo)}
function rngInt(lo,hi){return floor(rng(lo,hi+1))}
function vecLen(x,y){return sqrt(x*x+y*y)}
function vecNorm(x,y){const l=vecLen(x,y)||1;return{x:x/l,y:y/l}}
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = min(255, r+amt); g = min(255, g+amt); b = min(255, b+amt);
  return `rgb(${r},${g},${b})`;
}

const Debug = {
  enabled: false,
  log(msg) { if (this.enabled) console.log(`[HW] ${msg}`); },
  toggle() { this.enabled = !this.enabled; console.log(`Debug ${this.enabled ? 'ON' : 'OFF'}`); }
};

// ------------------------------------------------------------
// INPUT
// ------------------------------------------------------------
const Input = {
  keys: {}, justDown: {},
  init() {
    window.addEventListener('keydown', e => {
      if (!this.keys[e.code]) this.justDown[e.code] = true;
      this.keys[e.code] = true;
      if (e.code === 'KeyR') Debug.toggle();
      e.preventDefault();
    });
    window.addEventListener('keyup', e => { this.keys[e.code] = false; });
  },
  down(code) { return !!this.keys[code]; },
  pressed(code) { return !!this.justDown[code]; },
  flush() { this.justDown = {}; },
  dirX() { return (this.down('KeyD')||this.down('ArrowRight')?1:0)-(this.down('KeyA')||this.down('ArrowLeft')?1:0); },
  dirY() { return (this.down('KeyS')||this.down('ArrowDown')?1:0)-(this.down('KeyW')||this.down('ArrowUp')?1:0); },
  sprinting() { return this.down('ShiftLeft')||this.down('ShiftRight'); },
};

// ------------------------------------------------------------
// THREE.JS SETUP — court-space (cx,cy,height) -> world (x,y,z)
// world X = court X - COURT_W/2   (baskets left/right)
// world Z = court Y - COURT_H/2   (near/far sideline, foreshortened by tilt)
// world Y = height above the floor
// ------------------------------------------------------------
const glCanvas = document.getElementById('gl');
const hud = document.getElementById('hud');
const hctx = hud.getContext('2d');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0b09);
scene.fog = new THREE.Fog(0x0c0b09, 90, 220);

const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true });
renderer.setPixelRatio(1);

const TILT = 55 * Math.PI/180; // camera elevation angle above the floor
const camera = new THREE.OrthographicCamera(-1,1,1,-1, 1, 500);
const CAM_DIST = 140;
camera.position.set(0, CAM_DIST*sin(TILT), CAM_DIST*cos(TILT));
camera.lookAt(0,0,0);

let sbH = 62;
let camHalfW = 50, camHalfH = 40;

function cx2wx(cx){ return cx - CFG.COURT_W/2; }
function cy2wz(cy){ return cy - CFG.COURT_H/2; }

function fitCamera(viewW, viewH) {
  const aspect = viewW / max(1,viewH);
  const desiredHalfWidth = CFG.COURT_W/2 + 7;
  const desiredHalfDepthProjected = (CFG.COURT_H/2 + 7) * sin(TILT) + 15 * cos(TILT);
  let halfH = desiredHalfDepthProjected;
  let halfW = halfH * aspect;
  if (halfW < desiredHalfWidth) { halfW = desiredHalfWidth; halfH = halfW / aspect; }
  camera.left = -halfW; camera.right = halfW;
  camera.top = halfH; camera.bottom = -halfH;
  camera.updateProjectionMatrix();
  camHalfW = halfW; camHalfH = halfH;
}

// pixel-per-world-unit approximation, used to keep original HUD sizing formulas working
let scale = 12;

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  hud.width = w; hud.height = h;
  sbH = clamp(floor(h * 0.085), 50, 80);
  const glW = w, glH = max(1, h - sbH);
  glCanvas.style.top = sbH + 'px';
  glCanvas.width = glW; glCanvas.height = glH;
  renderer.setSize(glW, glH, false);
  fitCamera(glW, glH);
  scale = glW / (2*camHalfW);
}
window.addEventListener('resize', resize);

// world-space (court coords + height) -> HUD screen pixel coords
function project3D(cx, cy, h) {
  const v = new THREE.Vector3(cx2wx(cx), h||0, cy2wz(cy));
  v.project(camera);
  const x = (v.x*0.5+0.5) * glCanvas.width;
  const y = (1 - (v.y*0.5+0.5)) * glCanvas.height + sbH;
  return { x, y };
}

// ------------------------------------------------------------
// LIGHTING
// ------------------------------------------------------------
scene.add(new THREE.HemisphereLight(0xfff2d8, 0x2a2015, 0.85));
const sun = new THREE.DirectionalLight(0xfff0d0, 0.9);
sun.position.set(-30, 60, 40);
scene.add(sun);
const fillLight = new THREE.DirectionalLight(0xaad0ff, 0.25);
fillLight.position.set(30, 40, -40);
scene.add(fillLight);

// ------------------------------------------------------------
// COURT TEXTURE + FLOOR MESH
// ------------------------------------------------------------
const TEX_SCALE = 18;
function drawPaintTex(tctx, basketX, isLeft) {
  const pw = CFG.PAINT_W/2, pl = CFG.PAINT_L;
  const bx = isLeft ? basketX - CFG.BACKBOARD_OFFSET : basketX + CFG.BACKBOARD_OFFSET;
  const x1 = isLeft ? bx : bx - pl;
  const y1 = CFG.BASKET_Y - pw, y2 = CFG.BASKET_Y + pw;
  const p1x = x1*TEX_SCALE, p1y = y1*TEX_SCALE, p2x = (x1+pl)*TEX_SCALE, p2y = y2*TEX_SCALE;
  tctx.fillStyle = CFG.PAINT_C;
  tctx.fillRect(p1x, p1y, p2x-p1x, p2y-p1y);
  tctx.strokeStyle = CFG.LINE_C;
  tctx.lineWidth = TEX_SCALE*0.08;
  tctx.strokeRect(p1x, p1y, p2x-p1x, p2y-p1y);
  const fcx = (x1+pl)*TEX_SCALE, fcy = CFG.BASKET_Y*TEX_SCALE;
  tctx.beginPath(); tctx.arc(fcx, fcy, CFG.FT_CIRCLE_R*TEX_SCALE, 0, PI*2); tctx.stroke();
  const rc = { x: basketX*TEX_SCALE, y: CFG.BASKET_Y*TEX_SCALE };
  tctx.beginPath(); tctx.arc(rc.x, rc.y, CFG.RESTRICTED_R*TEX_SCALE, 0, PI*2); tctx.stroke();
}
function drawThreeTex(tctx, basketX, isLeft) {
  tctx.strokeStyle = CFG.LINE_C;
  tctx.lineWidth = TEX_SCALE*0.08;
  const cornerX = isLeft ? CFG.THREE_PT_CORNER : CFG.COURT_W - CFG.THREE_PT_CORNER;
  const dx = cornerX - basketX;
  const dySq = CFG.THREE_PT_R**2 - dx**2;
  if (dySq < 0) return;
  const dy = sqrt(dySq);
  const yTop = CFG.BASKET_Y - dy, yBot = CFG.BASKET_Y + dy;
  tctx.beginPath(); tctx.moveTo(cornerX*TEX_SCALE, 0); tctx.lineTo(cornerX*TEX_SCALE, yTop*TEX_SCALE); tctx.stroke();
  tctx.beginPath(); tctx.moveTo(cornerX*TEX_SCALE, CFG.COURT_H*TEX_SCALE); tctx.lineTo(cornerX*TEX_SCALE, yBot*TEX_SCALE); tctx.stroke();
  const bc = { x: basketX*TEX_SCALE, y: CFG.BASKET_Y*TEX_SCALE };
  const aTop = atan2(yTop - CFG.BASKET_Y, cornerX - basketX);
  const aBot = atan2(yBot - CFG.BASKET_Y, cornerX - basketX);
  tctx.beginPath();
  if (isLeft) tctx.arc(bc.x, bc.y, CFG.THREE_PT_R*TEX_SCALE, aBot, aTop, false);
  else tctx.arc(bc.x, bc.y, CFG.THREE_PT_R*TEX_SCALE, aTop, aBot, false);
  tctx.stroke();
}
function makeCourtTexture() {
  const w = CFG.COURT_W*TEX_SCALE, h = CFG.COURT_H*TEX_SCALE;
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const tctx = c.getContext('2d');
  const floorGrad = tctx.createLinearGradient(0,0,0,h);
  floorGrad.addColorStop(0, lighten(CFG.COURT_C1, 14));
  floorGrad.addColorStop(0.5, CFG.COURT_C1);
  floorGrad.addColorStop(1, CFG.COURT_C2);
  tctx.fillStyle = floorGrad; tctx.fillRect(0,0,w,h);
  const plankW = TEX_SCALE*3.2;
  for (let x=0,i=0; x<w; x+=plankW, i++) {
    tctx.fillStyle = i%2 ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.03)';
    tctx.fillRect(x,0,min(plankW,w-x),h);
  }
  drawPaintTex(tctx, CFG.BASKET_LX, true);
  drawPaintTex(tctx, CFG.BASKET_RX, false);
  tctx.strokeStyle = CFG.LINE_C;
  tctx.lineWidth = TEX_SCALE*0.1;
  tctx.strokeRect(2,2,w-4,h-4);
  tctx.beginPath(); tctx.moveTo(w/2,0); tctx.lineTo(w/2,h); tctx.stroke();
  tctx.save();
  tctx.globalAlpha = 0.16;
  tctx.fillStyle = CFG.UI_ACCENT;
  tctx.font = `700 ${round(CFG.CENTER_CIRCLE_R*TEX_SCALE*1.1)}px Oswald, sans-serif`;
  tctx.textAlign = 'center'; tctx.textBaseline = 'middle';
  tctx.fillText('H', w/2, h/2);
  tctx.restore();
  tctx.beginPath(); tctx.arc(w/2, h/2, CFG.CENTER_CIRCLE_R*TEX_SCALE, 0, PI*2); tctx.stroke();
  drawThreeTex(tctx, CFG.BASKET_LX, true);
  drawThreeTex(tctx, CFG.BASKET_RX, false);
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 4;
  return tex;
}
const floorGeo = new THREE.PlaneGeometry(CFG.COURT_W, CFG.COURT_H);
const floorMat = new THREE.MeshStandardMaterial({ map: makeCourtTexture(), roughness: 0.85, metalness: 0.05 });
const floorMesh = new THREE.Mesh(floorGeo, floorMat);
floorMesh.rotation.x = -PI/2;
scene.add(floorMesh);

// subtle out-of-bounds apron
const apronGeo = new THREE.PlaneGeometry(CFG.COURT_W+40, CFG.COURT_H+40);
const apronMat = new THREE.MeshStandardMaterial({ color: 0x141210, roughness: 1 });
const apronMesh = new THREE.Mesh(apronGeo, apronMat);
apronMesh.rotation.x = -PI/2;
apronMesh.position.y = -0.05;
scene.add(apronMesh);

// ------------------------------------------------------------
// HOOPS (backboard + rim + net) at both ends
// ------------------------------------------------------------
function buildHoop(basketX, isLeft) {
  const g = new THREE.Group();
  const wx = cx2wx(basketX);
  const facing = isLeft ? 1 : -1; // court-inward direction along X
  const bbX = wx - facing*CFG.BACKBOARD_OFFSET;

  const poleMat = new THREE.MeshStandardMaterial({ color: 0x2a2a28, roughness: 0.6 });
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35, CFG.BACKBOARD_H+2, 10), poleMat);
  pole.position.set(bbX - facing*1.2, (CFG.BACKBOARD_H+2)/2 - 1, 0);
  g.add(pole);
  const arm = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.25,0.25), poleMat);
  arm.position.set(bbX - facing*0.6, CFG.BACKBOARD_H-0.3, 0);
  g.add(arm);

  const bbMat = new THREE.MeshStandardMaterial({ color: 0xf2f2f2, transparent: true, opacity: 0.55, roughness: 0.3 });
  const backboard = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.2, 6), bbMat);
  backboard.position.set(bbX, CFG.BACKBOARD_H - 1.6, 0);
  g.add(backboard);
  const edgeMat = new THREE.MeshBasicMaterial({ color: CFG.UI_ACCENT });
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(0.16,3.2,6)), edgeMat);
  edges.position.copy(backboard.position);
  g.add(edges);

  const rimX = bbX + facing*0.9;
  const rimMat = new THREE.MeshStandardMaterial({ color: 0xE8501A, roughness: 0.4, metalness: 0.3 });
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.75, 0.06, 10, 24), rimMat);
  rim.rotation.x = PI/2;
  rim.position.set(rimX, CFG.RIM_HEIGHT, 0);
  g.add(rim);

  // net: lathe funnel, semi-transparent, gently swaying
  const pts = [];
  for (let i=0;i<=8;i++){
    const t = i/8;
    pts.push(new THREE.Vector2(lerp(0.75,0.32,t), -t*1.6));
  }
  const netGeo = new THREE.LatheGeometry(pts, 16);
  const netMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.5, wireframe: true });
  const net = new THREE.Mesh(netGeo, netMat);
  net.position.set(rimX, CFG.RIM_HEIGHT, 0);
  g.add(net);

  g.userData.net = net;
  g.userData.swishSide = isLeft ? 'left' : 'right';
  return g;
}
const hoopLeft = buildHoop(CFG.BASKET_LX, true);
const hoopRight = buildHoop(CFG.BASKET_RX, false);
scene.add(hoopLeft, hoopRight);

// ------------------------------------------------------------
// FLOATING TEXT SYSTEM (world-anchored, drawn on hud overlay)
// ------------------------------------------------------------
const Floats = [];
function addFloat(text, cx, cy, color, size) {
  Floats.push({ text, cx, cy, h: 9, color, size: size||1, life: 1.6, max: 1.6 });
}
function updateFloats(dt) {
  for (let i = Floats.length - 1; i >= 0; i--) {
    Floats[i].life -= dt;
    Floats[i].h += dt * 4.5;
    if (Floats[i].life <= 0) Floats.splice(i, 1);
  }
}
function drawFloats() {
  for (const f of Floats) {
    const a = clamp(f.life / f.max * 2, 0, 1);
    const p = project3D(f.cx, f.cy, f.h);
    const age = f.max - f.life;
    const pop = clamp(age / 0.15, 0, 1);
    const fontPx = round(18 * f.size * scale / 12) * (0.6 + 0.4*pop);
    hctx.save();
    hctx.globalAlpha = a;
    hctx.font = `700 ${fontPx}px Oswald`;
    hctx.textAlign = 'center';
    hctx.shadowColor = 'rgba(0,0,0,0.6)';
    hctx.shadowBlur = scale * 0.15;
    hctx.shadowOffsetY = scale * 0.05;
    hctx.lineWidth = max(2, scale*0.14);
    hctx.strokeStyle = 'rgba(10,8,4,0.75)';
    hctx.strokeText(f.text, p.x, p.y);
    hctx.fillStyle = f.color;
    hctx.fillText(f.text, p.x, p.y);
    hctx.restore();
  }
  hctx.globalAlpha = 1;
}

// ------------------------------------------------------------
// PARTICLE BURSTS (world-anchored, drawn on hud overlay)
// ------------------------------------------------------------
const Particles = [];
function spawnBurst(cx, cy, color, count) {
  for (let i = 0; i < (count || 16); i++) {
    const ang = rng(0, PI * 2), spd = rng(3, 9);
    Particles.push({
      x: cx, y: cy, vx: cos(ang)*spd, vy: sin(ang)*spd,
      h: 0, vh: rng(6, 14),
      life: rng(0.5, 0.95), max: 0.95, color, size: rng(0.14, 0.3),
    });
  }
}
function updateParticles(dt) {
  for (let i = Particles.length - 1; i >= 0; i--) {
    const q = Particles[i];
    q.vh -= dt * 20;
    q.x += q.vx * dt; q.y += q.vy * dt; q.h += q.vh * dt;
    if (q.h < 0) q.h = 0;
    q.life -= dt;
    if (q.life <= 0) Particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const q of Particles) {
    const a = clamp(q.life / q.max, 0, 1);
    const p = project3D(q.x, q.y, q.h);
    hctx.globalAlpha = a;
    hctx.fillStyle = q.color;
    hctx.beginPath(); hctx.arc(p.x, p.y, q.size * scale, 0, PI*2); hctx.fill();
  }
  hctx.globalAlpha = 1;
}

// ------------------------------------------------------------
// NET SWISH EFFECT
// ------------------------------------------------------------
const Swish = { left: 0, right: 0 };
function updateSwish(dt) {
  Swish.left = max(0, Swish.left - dt * 2.2);
  Swish.right = max(0, Swish.right - dt * 2.2);
  const t = performance.now()*0.006;
  hoopLeft.userData.net.rotation.z = sin(t) * 0.12 * Swish.left;
  hoopLeft.userData.net.scale.y = 1 + Swish.left*0.18;
  hoopRight.userData.net.rotation.z = sin(t+1) * 0.12 * Swish.right;
  hoopRight.userData.net.scale.y = 1 + Swish.right*0.18;
}
function triggerSwish(basketX) {
  if (basketX < 47) Swish.left = 1; else Swish.right = 1;
}

// ------------------------------------------------------------
// BALL — data/physics unchanged; 3D mesh added
// ------------------------------------------------------------
function makeBasketballTexture() {
  const s = 256;
  const c = document.createElement('canvas'); c.width=s; c.height=s;
  const bctx = c.getContext('2d');
  const grad = bctx.createRadialGradient(s*0.35,s*0.35,s*0.05,s*0.5,s*0.5,s*0.7);
  grad.addColorStop(0,'#F5A050'); grad.addColorStop(0.55, CFG.BALL_C); grad.addColorStop(1,'#A8480F');
  bctx.fillStyle = grad; bctx.fillRect(0,0,s,s);
  bctx.strokeStyle = 'rgba(40,15,0,0.6)'; bctx.lineWidth = 4;
  bctx.beginPath(); bctx.moveTo(0,s/2); bctx.lineTo(s,s/2); bctx.stroke();
  bctx.beginPath(); bctx.moveTo(s/2,0); bctx.lineTo(s/2,s); bctx.stroke();
  bctx.beginPath(); bctx.moveTo(s/2,0); bctx.quadraticCurveTo(s*0.2,s/2,s/2,s); bctx.stroke();
  bctx.beginPath(); bctx.moveTo(s/2,0); bctx.quadraticCurveTo(s*0.8,s/2,s/2,s); bctx.stroke();
  return new THREE.CanvasTexture(c);
}

const Ball = {
  x: 47, y: 25, vx: 0, vy: 0,
  owner: null, state: 'held',
  height: 0,
  spinAngle: 0,
  flightStart: null, flightTarget: null,
  flightProgress: 0, flightDuration: 0,
  flightResult: null, flightPoints: 0, flightShooter: null,
  trail: [],
  reset(cx, cy) {
    this.x = cx; this.y = cy; this.vx = 0; this.vy = 0;
    this.owner = null; this.state = 'held'; this.height = 0;
    this.flightStart = null; this.flightTarget = null;
    this.flightProgress = 0; this.flightResult = null;
    this.flightShooter = null;
    this.trail = [];
  },
  giveTo(player) {
    this.owner = player; this.state = 'held';
    player.hasBall = true; this.height = 0;
    this.x = player.x; this.y = player.y;
  },
  release() {
    if (this.owner) this.owner.hasBall = false;
    this.owner = null;
  },
  update(dt) {
    if (this.state === 'held' && this.owner) {
      this.x = this.owner.x; this.y = this.owner.y;
      this.height = 1.4;
      this.trail = [];
      this.spinAngle += vecLen(this.owner.vx, this.owner.vy) * dt * 0.15;
      return;
    }
    if (this.state === 'flight') {
      this.flightProgress += dt / this.flightDuration;
      if (this.flightProgress >= 1) {
        this.flightProgress = 1;
        this.onFlightEnd();
        return;
      }
      const t = this.flightProgress;
      this.x = lerp(this.flightStart.x, this.flightTarget.x, t);
      this.y = lerp(this.flightStart.y, this.flightTarget.y, t);
      this.height = 1.4 + sin(t * PI) * (8 + dist(this.flightStart.x,this.flightStart.y,this.flightTarget.x,this.flightTarget.y)*0.15);
      this.spinAngle += dt * 5.5;
      this.trail.push({x:this.x,y:this.y,h:this.height,life:0.3});
      return;
    }
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.vx *= CFG.BALL_FRICTION; this.vy *= CFG.BALL_FRICTION;
    this.height = max(0, this.height - dt * 30);
    this.spinAngle += vecLen(this.vx, this.vy) * dt * 0.2;
    if (this.x < CFG.BALL_R) { this.x = CFG.BALL_R; this.vx = abs(this.vx)*CFG.BOUNCE_DAMP; }
    if (this.x > CFG.COURT_W - CFG.BALL_R) { this.x = CFG.COURT_W-CFG.BALL_R; this.vx = -abs(this.vx)*CFG.BOUNCE_DAMP; }
    if (this.y < CFG.BALL_R) { this.y = CFG.BALL_R; this.vy = abs(this.vy)*CFG.BOUNCE_DAMP; }
    if (this.y > CFG.COURT_H - CFG.BALL_R) { this.y = CFG.COURT_H-CFG.BALL_R; this.vy = -abs(this.vy)*CFG.BOUNCE_DAMP; }
    if (vecLen(this.vx,this.vy) < 0.3) { this.vx = 0; this.vy = 0; }
    this.trail.push({x:this.x,y:this.y,h:this.height,life:0.2});
    for (let i=this.trail.length-1;i>=0;i--) {
      this.trail[i].life -= dt;
      if (this.trail[i].life<=0) this.trail.splice(i,1);
    }
  },
  onFlightEnd() {
    const shooter = this.flightShooter;
    const madeShot = this.flightResult === 'make' || this.flightResult === 'ftmake';
    const isFT = this.flightResult === 'ftmake' || this.flightResult === 'ftmiss';
    if (madeShot) {
      if (shooter && !isFT) {
        shooter.streak++;
        shooter.streakTimer = CFG.HOT_STREAK_DECAY_T;
        if (shooter.streak >= 3) addFloat('ON FIRE', shooter.x, shooter.y - 4.5, '#FFD700', 0.9);
      }
      if (isFT) { Game.onFreeThrowResult(true); }
      else { Game.onScore(this.flightPoints); }
    } else {
      if (shooter && !isFT) shooter.streak = 0;
      const angle = rng(0, PI * 2);
      const spd = rng(6, 14);
      this.vx = cos(angle) * spd;
      this.vy = sin(angle) * spd;
      this.state = 'loose'; this.height = 2;
      this.flightStart = null; this.flightResult = null;
      addFloat('MISS', this.x, this.y - 2, '#CC4444', 0.9);
      if (isFT) { Game.onFreeThrowResult(false); }
      else { Game.onMiss(); }
    }
    this.flightShooter = null;
  },
  syncMesh() {
    const wx = cx2wx(this.x), wz = cy2wz(this.y);
    ballMesh.position.set(wx, this.height, wz);
    ballMesh.rotation.y = this.spinAngle;
    ballMesh.rotation.x = this.spinAngle*0.6;
    ballShadow.position.set(wx, 0.02, wz);
    const hFactor = clamp(this.height / 14, 0, 1);
    ballShadow.scale.setScalar(1.15 - 0.35*hFactor);
    ballShadow.material.opacity = 0.32 * (1 - 0.55*hFactor);
    ballMesh.visible = !(this.state==='held');
    // ball is drawn attached in player's hands too when held, so hide main sphere then and show a held variant
    ballMesh.visible = true;
    const inFlight = this.state === 'flight';
    for (let i=0;i<TRAIL_POOL;i++){
      const t = this.trail[this.trail.length-1-i];
      const m = ballTrailMeshes[i];
      if (t) {
        m.visible = true;
        m.position.set(cx2wx(t.x), t.h, cy2wz(t.y));
        m.material.opacity = clamp(t.life/(inFlight?0.3:0.2),0,1) * (inFlight?0.35:0.18);
      } else {
        m.visible = false;
      }
    }
  }
};

const ShotSys = {
  charging: false, chargeStart: 0, chargePower: 0,
  start() { this.charging = true; this.chargeStart = performance.now(); this.chargePower = 0; },
  release() {
    if (!this.charging) return null;
    this.charging = false;
    const power = this.chargePower;
    this.chargePower = 0;
    return power;
  },
  update() {
    if (!this.charging) return;
    const elapsed = (performance.now() - this.chargeStart) / 1000;
    const cycle = elapsed / CFG.SHOT_CHARGE_T;
    this.chargePower = (cycle % 2 <= 1) ? (cycle % 2) : (2 - (cycle % 2));
    this.chargePower = clamp(this.chargePower, 0, 1);
  },
  drawBar(player) {
    if (!this.charging || !player) return;
    const sp = project3D(player.x, player.y, PLAYER_HEIGHT);
    const barW = scale * 0.4, barH = scale * 5;
    const bx = sp.x - barW/2, by = sp.y - barH - scale*1.2;
    hctx.fillStyle = 'rgba(0,0,0,0.7)';
    hctx.fillRect(bx-1, by-1, barW+2, barH+2);
    const sweetY1 = by + barH * (1 - CFG.SWEET_MAX);
    const sweetY2 = by + barH * (1 - CFG.SWEET_MIN);
    hctx.fillStyle = 'rgba(40,180,80,0.4)';
    hctx.fillRect(bx, sweetY1, barW, sweetY2-sweetY1);
    hctx.fillStyle = 'rgba(200,50,40,0.3)';
    hctx.fillRect(bx, by, barW, sweetY1-by);
    hctx.fillRect(bx, sweetY2, barW, by+barH-sweetY2);
    const perfY = by + barH * (1 - CFG.SWEET_PERFECT);
    hctx.strokeStyle = '#FFD700';
    hctx.lineWidth = max(1, scale*0.06);
    hctx.beginPath(); hctx.moveTo(bx, perfY); hctx.lineTo(bx+barW, perfY); hctx.stroke();
    const mky = by + barH * (1 - this.chargePower);
    hctx.fillStyle = '#FFFFFF';
    hctx.fillRect(bx - scale*0.15, mky - scale*0.1, barW + scale*0.3, scale*0.2);
    hctx.strokeStyle = 'rgba(255,255,255,0.6)';
    hctx.lineWidth = max(1, scale*0.06);
    hctx.strokeRect(bx, by, barW, barH);
  }
};

function initiateShot(player, power) {
  const basket = Game.getAttackBasket(player.team);
  const d = dist(player.x, player.y, basket.x, basket.y);
  const powerAcc = 1 - abs(power - CFG.SWEET_PERFECT) / 0.72;
  const inSweet = power >= CFG.SWEET_MIN && power <= CFG.SWEET_MAX;
  const sweetBonus = inSweet ? 0.15 : 0;
  const distFactor = max(0, 1 - d / CFG.SHOT_MAX_DIST);
  const skillFactor = player.stats.shooting / 100;
  let contested = false;
  for (const p of Game.allPlayers()) {
    if (p.team !== player.team && dist(p.x,p.y,player.x,player.y) < 3.2) { contested = true; break; }
  }
  const contestMult = contested ? CFG.AI_CONTEST_PENALTY : 1.0;
  const fatiguePenalty = player.fatigued ? CFG.STAMINA_SHOT_PENALTY * (1 - player.energy/CFG.STAMINA_LOW_THRESH) : 0;
  const streakBonus = min(player.streak, CFG.HOT_STREAK_MAX) * CFG.HOT_STREAK_BONUS;
  let quality = (powerAcc*0.3 + distFactor*0.25 + skillFactor*0.25 + contestMult*0.2) + sweetBonus - fatiguePenalty + streakBonus;
  if (player.isControlled && d > CFG.THREE_PT_R - 1) {
    quality *= DIFFICULTIES[currentDifficulty].userThreeMult;
  }
  const isMade = random() < clamp(quality, 0.02, 0.94);
  const isThree = d > CFG.THREE_PT_R;
  Ball.release();
  Ball.flightStart = { x: player.x, y: player.y };
  Ball.flightTarget = { x: basket.x, y: basket.y };
  Ball.flightDuration = 0.45 + d / CFG.SHOT_FLIGHT_SPEED;
  Ball.flightProgress = 0;
  Ball.flightResult = isMade ? 'make' : 'miss';
  Ball.flightPoints = isThree ? 3 : 2;
  Ball.flightShooter = player;
  Ball.state = 'flight';
  player.hasBall = false;
  player.state = 'shooting';
}

function initiateFreeThrow(shooter) {
  const basket = Game.getAttackBasket(shooter.team);
  const d = dist(shooter.x, shooter.y, basket.x, basket.y);
  const fatiguePenalty = shooter.fatigued ? CFG.STAMINA_SHOT_PENALTY * 0.5 : 0;
  const streakBonus = min(shooter.streak, CFG.HOT_STREAK_MAX) * (CFG.HOT_STREAK_BONUS * 0.5);
  const quality = clamp(shooter.stats.shooting / 100 * 0.88 + 0.06 - fatiguePenalty + streakBonus, 0.25, 0.97);
  const isMade = random() < quality;
  Ball.release();
  Ball.flightStart = { x: shooter.x, y: shooter.y };
  Ball.flightTarget = { x: basket.x, y: basket.y };
  Ball.flightDuration = 0.45 + d / CFG.SHOT_FLIGHT_SPEED;
  Ball.flightProgress = 0;
  Ball.flightResult = isMade ? 'ftmake' : 'ftmiss';
  Ball.flightPoints = 1;
  Ball.flightShooter = shooter;
  Ball.state = 'flight';
  shooter.hasBall = false;
  shooter.state = 'shooting';
}

function initiatePass(from, to) {
  Ball.release();
  const lead = 0.42;
  Ball.flightStart = { x: from.x, y: from.y };
  Ball.flightTarget = { x: to.x + to.vx*lead, y: to.y + to.vy*lead };
  const d = dist(from.x,from.y,Ball.flightTarget.x,Ball.flightTarget.y);
  Ball.flightDuration = d / CFG.PASS_SPEED;
  Ball.flightProgress = 0;
  Ball.flightResult = 'pass';
  Ball.flightPoints = 0;
  Ball.state = 'flight';
  from.hasBall = false;
}

// ------------------------------------------------------------
// REBOUND SYSTEM
// ------------------------------------------------------------
function checkRebound() {
  if (Ball.state !== 'loose') return;
  const basket = Game.getAttackBasket(Game.possession === 'home' ? 'away' : 'home');
  const dToRim = dist(Ball.x, Ball.y, basket.x, basket.y);
  if (dToRim > CFG.REBOUND_R) return;

  let best = null, bestScore = -999;
  for (const p of Game.allPlayers()) {
    const d = dist(p.x, p.y, Ball.x, Ball.y);
    if (d > CFG.REBOUND_R + 3.5) continue;
    let score = (CFG.REBOUND_R + 2 - d) * CFG.REBOUND_AGGRESSION;
    if (p.team === Game.possession) score += CFG.REBOUND_CHANCE_OFF * 42;
    if (p.role === 'C' || p.role === 'PF') score += 18;
    if (p.role === 'SF') score += 6;
    if (score > bestScore) { bestScore = score; best = p; }
  }
  if (best && random() < 0.85) {
    Ball.giveTo(best);
    Game.possession = best.team;
    Game.shotClock = CFG.SHOT_CLOCK_REBOUND;
    addFloat(best.team === Game.possession ? 'OREB' : 'DREB', Ball.x, Ball.y - 3, '#FFD700', 1.1);
    Debug.log(`Aggressive rebound by #${best.num} (${best.team})`);
  }
}

// ------------------------------------------------------------
// AI (unchanged logic)
// ------------------------------------------------------------
const AI = {
  isOpen(passer, receiver) {
    const dx = receiver.x - passer.x;
    const dy = receiver.y - passer.y;
    const passLen = vecLen(dx, dy);
    if (passLen < 1) return true;
    let closestThreat = 999;
    for (const d of Game.allPlayers()) {
      if (d.team === passer.team) continue;
      const t = clamp(((d.x-passer.x)*dx + (d.y-passer.y)*dy) / (dx*dx + dy*dy), 0, 1);
      const projX = passer.x + t * dx;
      const projY = passer.y + t * dy;
      const threatDist = dist(d.x, d.y, projX, projY);
      if (threatDist < closestThreat) closestThreat = threatDist;
    }
    return closestThreat > CFG.PASS_LANE_SAFETY;
  },
  updateOffense(player, dt) {
    if (player.hasBall) {
      const basket = Game.getAttackBasket(player.team);
      const d = dist(player.x, player.y, basket.x, basket.y);
      if (d > CFG.THREE_PT_R - 3 && d < CFG.BASE_AI_SHOOT_RANGE + 4) {
        let nearestDef = 99, defendersBack = 0, contested = false;
        for (const p of Game.allPlayers()) {
          if (p.team !== player.team) {
            const defDist = dist(p.x, p.y, player.x, player.y);
            nearestDef = min(nearestDef, defDist);
            if (defDist < 4.2) contested = true;
            if (dist(p.x, p.y, basket.x, basket.y) < d + 4) defendersBack++;
          }
        }
        const openFactor = clamp((nearestDef - 3) / 7, 0, 1);
        const fastBreak = defendersBack < 2 ? CFG.BASE_AI_FASTBREAK_BONUS : 0;
        const fatigueMult = player.fatigued ? 0.58 : 1;
        const streakMult = 1 + min(player.streak, CFG.HOT_STREAK_MAX) * 0.22;
        const shootProb = CFG.BASE_AI_SHOOT_PROB * 1.35 * DIFFICULTIES[currentDifficulty].aiShootMult * (1 + openFactor * 5 + fastBreak) * (1 - (d - CFG.THREE_PT_R + 4)/CFG.BASE_AI_SHOOT_RANGE*0.45) * fatigueMult * streakMult * (contested ? 0.6 : 1.15);
        if (random() < shootProb) {
          const power = clamp(CFG.SWEET_PERFECT + rng(-0.14, 0.14), 0.1, 0.97);
          initiateShot(player, power);
          return;
        }
      }
      if (d < CFG.BASE_AI_SHOOT_RANGE) {
        let nearestDef = 99, defendersBack = 0, contested = false;
        for (const p of Game.allPlayers()) {
          if (p.team !== player.team) {
            const defDist = dist(p.x, p.y, player.x, player.y);
            nearestDef = min(nearestDef, defDist);
            if (defDist < 4) contested = true;
            if (dist(p.x, p.y, basket.x, basket.y) < d + 3) defendersBack++;
          }
        }
        const openFactor = clamp((nearestDef - 2.5) / 6, 0, 1);
        const fastBreak = defendersBack < 2 ? CFG.BASE_AI_FASTBREAK_BONUS : 0;
        const fatigueMult = player.fatigued ? 0.62 : 1;
        const streakMult = 1 + min(player.streak, CFG.HOT_STREAK_MAX) * 0.18;
        const driveScore = d < 12 ? CFG.BASE_AI_DRIVE_AGGRESSION : 0.4;
        const shootProb = CFG.BASE_AI_SHOOT_PROB * DIFFICULTIES[currentDifficulty].aiShootMult * (1 + openFactor * 4.5 + fastBreak) * (1 - d/CFG.BASE_AI_SHOOT_RANGE*0.4) * fatigueMult * streakMult * (contested ? 0.65 : 1.1);
        if (random() < shootProb) {
          const power = clamp(CFG.SWEET_PERFECT + rng(-0.13, 0.13), 0.12, 0.96);
          initiateShot(player, power);
          return;
        }
        if (random() < driveScore * (1 - d/18)) {
          this.moveToward(player, basket.x + rng(-4,4), basket.y + rng(-3,3), dt, player.stats.speed * 0.92);
          return;
        }
      }
      const passProb = CFG.BASE_AI_PASS_PROB * (player.fatigued ? 1.48 : 1) * (d > 16 ? 1.32 : 1);
      if (random() < passProb) {
        const target = this.findPassTarget(player);
        if (target) { initiatePass(player, target); return; }
      }
      this.moveToward(player, basket.x, basket.y, dt, player.stats.speed * (player.fatigued ? 0.58 : 0.88));
    } else {
      const drift = sin(performance.now()*0.001 + player.num*1.7) * 3.5;
      const targetX = player.offPos.x + drift;
      const targetY = player.offPos.y + cos(performance.now()*0.0008 + player.num)*2.5;
      this.moveToward(player, targetX, targetY, dt, player.stats.speed * 0.72);
    }
  },
  updateDefense(player, dt) {
    const offTeam = player.team === 'home' ? Game.away : Game.home;
    const target = offTeam[player.assignIdx];
    if (!target) return;
    const basket = Game.getDefendBasket(player.team);
    const dx = target.x - basket.x, dy = target.y - basket.y;
    const d = vecLen(dx, dy) || 1;
    const tightness = target.hasBall ? CFG.BASE_AI_DEF_TIGHTNESS : 0.64;
    let fx = basket.x + dx * tightness;
    let fy = basket.y + dy * tightness;
    const ballHandler = Game.allPlayers().find(p => p.hasBall);
    if (ballHandler && ballHandler !== target && ballHandler.team !== player.team) {
      const ballToBasket = dist(ballHandler.x, ballHandler.y, basket.x, basket.y);
      if (ballToBasket < CFG.PAINT_L * 1.4) {
        const proximity = clamp((CFG.BASE_AI_HELP_R - dist(player.x,player.y,ballHandler.x,ballHandler.y)) / CFG.BASE_AI_HELP_R, 0, 1);
        const helpPull = proximity * CFG.BASE_AI_HELP_SAG * 1.25;
        fx = lerp(fx, ballHandler.x, helpPull);
        fy = lerp(fy, ballHandler.y, helpPull);
      }
    }
    this.moveToward(player, fx, fy, dt, player.stats.speed * (player.fatigued ? 0.68 : 0.92) * DIFFICULTIES[currentDifficulty].aiDefenseMult);
    if (player.firedOut) return;
    if (target.hasBall) {
      const stealD = dist(player.x, player.y, target.x, target.y);
      if (stealD < CFG.BASE_AI_STEAL_R * 1.1) {
        if (random() < CFG.BASE_AI_STEAL_PROB * DIFFICULTIES[currentDifficulty].aiDefenseMult * (player.stats.stealing / 130)) {
          Ball.giveTo(player);
          Game.possession = player.team;
          Game.shotClock = CFG.SHOT_CLOCK;
          addFloat('STEAL', player.x, player.y-2, '#FFD700', 1);
          spawnBurst(player.x, player.y, '#FFD700', 12);
        } else if (random() < CFG.FOUL_PROB_STEAL * 0.82) {
          Game.commitFoul(player, target);
        }
      }
    }
  },
  moveToward(player, tx, ty, dt, speed) {
    const dx = tx - player.x, dy = ty - player.y;
    const d = vecLen(dx, dy);
    if (d < 0.6) { player.vx *= 0.75; player.vy *= 0.75; return; }
    const nx = dx/d, ny = dy/d;
    speed *= staminaSpeedMult(player);
    const desired = min(speed, d * 4.5);
    player.vx = lerp(player.vx, nx * desired, min(1, dt * 7.5));
    player.vy = lerp(player.vy, ny * desired, min(1, dt * 7.5));
    player.facing = nx > 0.08 ? 1 : nx < -0.08 ? -1 : player.facing;
  },
  findPassTarget(player) {
    const teammates = (player.team === 'home' ? Game.home : Game.away).filter(t => t !== player);
    let best = null, bestScore = -999;
    for (const t of teammates) {
      let score = 0;
      const basket = Game.getAttackBasket(player.team);
      const td = dist(t.x, t.y, basket.x, basket.y);
      score -= td * 0.24;
      let minDef = 999;
      for (const d of Game.allPlayers()) {
        if (d.team !== player.team) minDef = Math.min(minDef, dist(d.x,d.y,t.x,t.y));
      }
      score += minDef * 0.7;
      if (this.isOpen(player, t)) score += 22;
      const passD = dist(player.x,player.y,t.x,t.y);
      let laneClear = true;
      for (const d of Game.allPlayers()) {
        if (d.team === player.team) continue;
        const lx = t.x-player.x, ly = t.y-player.y;
        const t2 = clamp(((d.x-player.x)*lx+(d.y-player.y)*ly)/(lx*lx+ly*ly),0,1);
        const px = player.x+t2*lx, py = player.y+t2*ly;
        if (dist(d.x,d.y,px,py) < CFG.PASS_LANE_SAFETY) { laneClear = false; break; }
      }
      if (!laneClear) score -= 13;
      if (score > bestScore) { bestScore = score; best = t; }
    }
    return best;
  }
};

// ------------------------------------------------------------
// PHYSICS
// ------------------------------------------------------------
function updatePlayerPhysics(player, dt) {
  if (player.state === 'shooting') { player.vx *= 0.9; player.vy *= 0.9; }
  player.x += player.vx * dt;
  player.y += player.vy * dt;
  player.x = clamp(player.x, player.r, CFG.COURT_W - player.r);
  player.y = clamp(player.y, player.r, CFG.COURT_H - player.r);
  if (!player.isControlled) {
    player.vx *= (1 - 3*dt);
    player.vy *= (1 - 3*dt);
  }
  updatePlayerStamina(player, dt);
}
function updatePlayerStamina(player, dt) {
  const spd = vecLen(player.vx, player.vy);
  const topSpeed = player.stats.speed * CFG.SPRINT_MULT;
  const staminaFactor = 0.5 + player.stats.stamina / 200;
  if (spd > topSpeed * 0.75) {
    player.energy -= (CFG.STAMINA_SPRINT_DRAIN / staminaFactor) * dt;
  } else if (spd > topSpeed * 0.25) {
    player.energy -= (CFG.STAMINA_MOVE_DRAIN / staminaFactor) * dt;
  } else {
    player.energy += CFG.STAMINA_REGEN_IDLE * staminaFactor * dt;
  }
  player.energy = clamp(player.energy, 0, CFG.STAMINA_MAX);
  player.fatigued = player.energy < CFG.STAMINA_LOW_THRESH;
  if (player.streak > 0) {
    player.streakTimer -= dt;
    if (player.streakTimer <= 0) { player.streak = 0; }
  }
}
function staminaSpeedMult(player) {
  if (player.energy >= CFG.STAMINA_LOW_THRESH) return 1;
  const t = clamp(player.energy / CFG.STAMINA_LOW_THRESH, 0, 1);
  return lerp(CFG.STAMINA_MIN_SPEED_MULT, 1, t);
}
function resolveCollisions(players) {
  for (let i = 0; i < players.length; i++) {
    for (let j = i+1; j < players.length; j++) {
      const a = players[i], b = players[j];
      const dx = b.x-a.x, dy = b.y-a.y;
      const d = vecLen(dx, dy);
      const minD = a.r + b.r;
      if (d < minD && d > 0.01) {
        const overlap = (minD - d) * 0.5;
        const nx = dx/d, ny = dy/d;
        a.x -= nx*overlap; a.y -= ny*overlap;
        b.x += nx*overlap; b.y += ny*overlap;
        const relV = (b.vx-a.vx)*nx + (b.vy-a.vy)*ny;
        if (relV < 0) {
          a.vx += nx*relV*0.3; a.vy += ny*relV*0.3;
          b.vx -= nx*relV*0.3; b.vy -= ny*relV*0.3;
        }
      }
    }
  }
}
function checkBallPickup() {
  if (Ball.state !== 'loose') return;
  for (const p of Game.allPlayers()) {
    if (dist(Ball.x, Ball.y, p.x, p.y) < CFG.PICKUP_R) {
      Ball.giveTo(p);
      Game.possession = p.team;
      if (Game.shotClock > CFG.SHOT_CLOCK_REBOUND) Game.shotClock = CFG.SHOT_CLOCK_REBOUND;
      return;
    }
  }
}
function checkPassIntercept() {
  if (Ball.state !== 'flight' || Ball.flightResult !== 'pass') return;
  for (const p of Game.allPlayers()) {
    if (Ball.flightStart && Ball.owner === null) {
      if (p.team !== Game.possession && dist(Ball.x, Ball.y, p.x, p.y) < CFG.PASS_INTERCEPT_R) {
        if (random() < 0.24) {
          Ball.giveTo(p);
          Game.possession = p.team;
          Game.shotClock = CFG.SHOT_CLOCK;
          addFloat('INTERCEPTED', p.x, p.y-2, '#FFD700', 0.9);
          return;
        }
      }
    }
  }
}
function checkPassArrival() {
  if (Ball.state !== 'flight' || Ball.flightResult !== 'pass') return;
  if (Ball.flightProgress >= 1) {
    const team = Game.possession === 'home' ? Game.home : Game.away;
    let best = null, bestD = 99;
    for (const p of team) {
      const d = dist(p.x, p.y, Ball.flightTarget.x, Ball.flightTarget.y);
      if (d < bestD) { bestD = d; best = p; }
    }
    if (best && bestD < 5.5) {
      Ball.giveTo(best);
    } else {
      Ball.state = 'loose';
      Ball.vx = rng(-3,3); Ball.vy = rng(-3,3);
    }
    Ball.flightResult = null; Ball.flightStart = null;
  }
}

// ------------------------------------------------------------
// GAME STATE (unchanged logic)
// ------------------------------------------------------------
const Game = {
  state: 'menu',
  possession: 'home',
  home: [], away: [],
  score: { home: 0, away: 0 },
  quarter: 1, quarterClock: CFG.QUARTER_TIME,
  shotClock: CFG.SHOT_CLOCK,
  stateTimer: 0,
  lastPossession: 'away',
  fouls: { home: 0, away: 0 },
  foulRetainTeam: null,
  pendingFT: null,

  init() {
    this.setupTeams();
    this.resetPositions();
    Ball.reset(47, 25);
    this.score = { home: 0, away: 0 };
    this.quarter = 1;
    this.quarterClock = CFG.QUARTER_TIME;
    this.shotClock = CFG.SHOT_CLOCK;
    this.state = 'menu';
    this.possession = 'home';
    this.lastPossession = 'away';
    this.fouls = { home: 0, away: 0 };
    this.foulRetainTeam = null;
    this.pendingFT = null;
    for (const p of this.allPlayers()) { p.fouls = 0; p.firedOut = false; p.streak = 0; p.energy = CFG.STAMINA_MAX; }
    Floats.length = 0;
    Particles.length = 0;
  },
  setupTeams() {
    this.home = [
      createPlayer('home','PG',1, 47, 25),
      createPlayer('home','SG',2, 55, 12),
      createPlayer('home','SF',3, 55, 38),
      createPlayer('home','PF',4, 65, 18),
      createPlayer('home','C', 5, 65, 32),
    ];
    this.away = [
      createPlayer('away','PG',1, 47, 25),
      createPlayer('away','SG',2, 39, 12),
      createPlayer('away','SF',3, 39, 38),
      createPlayer('away','PF',4, 29, 18),
      createPlayer('away','C', 5, 29, 32),
    ];
    this.setOffensivePositions(this.home, 'right');
    this.setOffensivePositions(this.away, 'left');
    for (let i = 0; i < 5; i++) {
      this.home[i].assignIdx = i;
      this.away[i].assignIdx = i;
    }
    for (const p of this.allPlayers()) buildPlayer3D(p);
  },
  setOffensivePositions(team, side) {
    const sign = side === 'right' ? 1 : -1;
    const base = side === 'right' ? 47 : 47;
    team[0].offPos = { x: base + sign*8, y: 25 };
    team[1].offPos = { x: base + sign*22, y: 12 };
    team[2].offPos = { x: base + sign*22, y: 38 };
    team[3].offPos = { x: base + sign*32, y: 18 };
    team[4].offPos = { x: base + sign*34, y: 32 };
  },
  allPlayers() { return [...this.home, ...this.away]; },
  getAttackBasket(team) {
    return team === 'home' ? { x: CFG.BASKET_RX, y: CFG.BASKET_Y } : { x: CFG.BASKET_LX, y: CFG.BASKET_Y };
  },
  getDefendBasket(team) {
    return team === 'home' ? { x: CFG.BASKET_LX, y: CFG.BASKET_Y } : { x: CFG.BASKET_RX, y: CFG.BASKET_Y };
  },
  resetPositions() {
    const offTeam = this.possession === 'home' ? this.home : this.away;
    const defTeam = this.possession === 'home' ? this.away : this.home;
    const side = this.possession === 'home' ? 'right' : 'left';
    offTeam[0].x = 47; offTeam[0].y = 25;
    offTeam[1].x = 47 + (side==='right'?8:-8); offTeam[1].y = 12;
    offTeam[2].x = 47 + (side==='right'?8:-8); offTeam[2].y = 38;
    offTeam[3].x = 47 + (side==='right'?15:-15); offTeam[3].y = 18;
    offTeam[4].x = 47 + (side==='right'?15:-15); offTeam[4].y = 32;
    defTeam[0].x = 47; defTeam[0].y = 25;
    for (let i=1;i<5;i++) {
      defTeam[i].x = offTeam[i].x + (side==='right'?-3:3);
      defTeam[i].y = offTeam[i].y;
    }
    for (const p of this.allPlayers()) { p.vx = 0; p.vy = 0; p.state = 'idle'; }
  },
  getControlledPlayer() {
    return this.allPlayers().find(p => p.isControlled);
  },
  switchControl() {
    const current = this.getControlledPlayer();
    if (current) current.isControlled = false;
    let target = null;
    if (this.possession === 'home') {
      target = this.home.find(p => p.hasBall) || this.home[0];
    } else {
      let bestD = 99;
      for (const p of this.home) {
        const d = dist(p.x,p.y,Ball.x,Ball.y);
        if (d < bestD) { bestD = d; target = p; }
      }
      if (!target) target = this.home[0];
    }
    if (target) target.isControlled = true;
  },
  onScore(points) {
    const team = this.possession;
    this.score[team] += points;
    const basket = this.getAttackBasket(team);
    const label = points === 3 ? '+3' : '+2';
    const color = team === 'home' ? CFG.HOME_C : CFG.AWAY_C;
    addFloat(label, basket.x, basket.y - 3, color, 1.4);
    if (points === 3) addFloat('THREE!', basket.x, basket.y - 5.5, '#FFD700', 1.1);
    spawnBurst(basket.x, basket.y, color, points === 3 ? 22 : 16);
    triggerSwish(basket.x);
    Ball.reset(basket.x, basket.y);
    Ball.state = 'held';
    this.state = 'scored';
    this.stateTimer = CFG.SCORE_DELAY;
  },
  onMiss() {
    Debug.log('Miss -> rebound phase');
  },
  commitFoul(defender, offender) {
    defender.fouls++;
    if (defender.fouls >= CFG.FOUL_OUT_LIMIT) defender.firedOut = true;
    this.fouls[defender.team]++;
    const label = defender.firedOut ? 'FOULED OUT' : 'FOUL';
    addFloat(label, defender.x, defender.y - 2.5, '#FF8844', 1);
    const inBonus = this.fouls[defender.team] >= CFG.TEAM_FOUL_BONUS;
    if (inBonus) {
      this.startFreeThrow(offender, 2);
    } else {
      this.foulRetainTeam = offender.team;
      this.state = 'foul';
      this.stateTimer = CFG.FOUL_DEADBALL_T;
    }
  },
  startFreeThrow(shooter, trips) {
    const basket = this.getAttackBasket(shooter.team);
    const sign = shooter.team === 'home' ? -1 : 1;
    shooter.x = basket.x + sign * CFG.PAINT_L;
    shooter.y = CFG.BASKET_Y;
    shooter.vx = 0; shooter.vy = 0;
    Ball.reset(shooter.x, shooter.y);
    Ball.giveTo(shooter);
    this.pendingFT = { shooter, tripsLeft: trips, team: shooter.team };
    this.state = 'freethrow';
    this.stateTimer = CFG.FT_DELAY;
  },
  onFreeThrowResult(made) {
    const ft = this.pendingFT;
    if (!ft) return;
    if (made) {
      this.score[ft.team]++;
      const basket = this.getAttackBasket(ft.team);
      const color = ft.team === 'home' ? CFG.HOME_C : CFG.AWAY_C;
      addFloat('+1', basket.x, basket.y - 3, color, 1.1);
      spawnBurst(basket.x, basket.y, color, 10);
      triggerSwish(basket.x);
    }
    ft.tripsLeft--;
    if (ft.tripsLeft > 0) {
      this.stateTimer = CFG.FT_DELAY;
      Ball.reset(ft.shooter.x, ft.shooter.y);
      Ball.giveTo(ft.shooter);
      return;
    }
    this.pendingFT = null;
    this.shotClock = CFG.SHOT_CLOCK;
    if (made) {
      this.possession = ft.team === 'home' ? 'away' : 'home';
      this.resetPositions();
      Ball.reset(ft.shooter.x, ft.shooter.y);
      const pg = (this.possession === 'home' ? this.home : this.away)[0];
      Ball.giveTo(pg);
      this.switchControl();
    } else {
      this.possession = ft.team;
      this.switchControl();
    }
    this.state = 'playing';
  },
  startQuarter() {
    this.quarterClock = CFG.QUARTER_TIME;
    this.shotClock = CFG.SHOT_CLOCK;
    this.fouls = { home: 0, away: 0 };
    this.possession = this.quarter % 2 === 1 ? 'home' : 'away';
    this.resetPositions();
    Ball.reset(47, 25);
    const pg = (this.possession === 'home' ? this.home : this.away)[0];
    Ball.giveTo(pg);
    this.switchControl();
    this.state = 'playing';
  },
  update(dt) {
    updateFloats(dt);
    updateParticles(dt);
    updateSwish(dt);
    if (this.state === 'menu') {
      if (Input.pressed('Space')) { this.init(); this.state = 'difficulty_select'; }
      return;
    }
    if (this.state === 'difficulty_select') {
      if (Input.pressed('Digit1')) currentDifficulty = 'EASY';
      if (Input.pressed('Digit2')) currentDifficulty = 'NORMAL';
      if (Input.pressed('Digit3')) currentDifficulty = 'HARD';
      if (Input.pressed('Digit4')) currentDifficulty = 'EXPERT';
      if (Input.pressed('Digit1') || Input.pressed('Digit2') || Input.pressed('Digit3') || Input.pressed('Digit4')) {
        this.state = 'tipoff';
        this.stateTimer = CFG.TIP_DELAY;
      }
      return;
    }
    if (this.state === 'tipoff') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) this.startQuarter();
      return;
    }
    if (this.state === 'scored') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) {
        this.possession = this.possession === 'home' ? 'away' : 'home';
        this.shotClock = CFG.SHOT_CLOCK;
        this.resetPositions();
        const pg = (this.possession === 'home' ? this.home : this.away)[0];
        Ball.giveTo(pg);
        this.switchControl();
        this.state = 'playing';
      }
      return;
    }
    if (this.state === 'foul') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) {
        this.possession = this.foulRetainTeam;
        this.foulRetainTeam = null;
        this.shotClock = CFG.SHOT_CLOCK;
        this.resetPositions();
        const pg = (this.possession === 'home' ? this.home : this.away)[0];
        Ball.giveTo(pg);
        this.switchControl();
        this.state = 'playing';
      }
      return;
    }
    if (this.state === 'freethrow') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0 && Ball.state === 'held' && this.pendingFT) {
        initiateFreeThrow(this.pendingFT.shooter);
        this.stateTimer = 999;
      }
      Ball.update(dt);
      return;
    }
    if (this.state === 'quarter_end') {
      this.stateTimer -= dt;
      if (this.stateTimer <= 0) {
        if (this.quarter >= CFG.QUARTERS) { this.state = 'game_over'; }
        else { this.quarter++; this.state = 'tipoff'; this.stateTimer = CFG.TIP_DELAY; }
      }
      return;
    }
    if (this.state === 'game_over') {
      if (Input.pressed('Space')) { this.init(); this.state = 'difficulty_select'; }
      return;
    }
    this.quarterClock -= dt;
    this.shotClock -= dt;
    if (this.shotClock <= 0) {
      addFloat('SHOT CLOCK', 47, 25, '#FF4444', 1.2);
      this.possession = this.possession === 'home' ? 'away' : 'home';
      this.shotClock = CFG.SHOT_CLOCK;
      this.resetPositions();
      const pg = (this.possession === 'home' ? this.home : this.away)[0];
      Ball.giveTo(pg);
      this.switchControl();
    }
    if (this.quarterClock <= 0) {
      this.quarterClock = 0;
      this.state = 'quarter_end';
      this.stateTimer = 2.0;
      return;
    }
    this.handleInput(dt);
    const offTeam = this.possession === 'home' ? this.home : this.away;
    const defTeam = this.possession === 'home' ? this.away : this.home;
    for (const p of offTeam) { if (!p.isControlled) AI.updateOffense(p, dt); }
    for (const p of defTeam) { if (!p.isControlled) AI.updateDefense(p, dt); }
    for (const p of this.allPlayers()) updatePlayerPhysics(p, dt);
    resolveCollisions(this.allPlayers());
    Ball.update(dt);
    ShotSys.update();
    checkBallPickup();
    checkPassIntercept();
    checkPassArrival();
    checkRebound();
    if (this.possession === 'home') {
      const ballHandler = this.home.find(p => p.hasBall);
      const ctrl = this.getControlledPlayer();
      if (ballHandler && ctrl && ctrl !== ballHandler && !ctrl.hasBall) this.switchControl();
    } else if (Input.pressed('Tab')) {
      const cur = this.getControlledPlayer();
      if (cur) cur.isControlled = false;
      const idx = this.home.indexOf(cur);
      const next = this.home[(idx+1) % 5];
      next.isControlled = true;
    }
  },
  handleInput(dt) {
    const cp = this.getControlledPlayer();
    if (!cp) return;
    const dx = Input.dirX(), dy = Input.dirY();
    const dirLen = vecLen(dx, dy);
    if (dirLen > 0) {
      const spd = cp.stats.speed * (Input.sprinting() ? CFG.SPRINT_MULT : 1) * (cp.hasBall ? CFG.BALL_SPEED_MULT : 1) * staminaSpeedMult(cp);
      const nx = dx/dirLen, ny = dy/dirLen;
      cp.vx = lerp(cp.vx, nx*spd, min(1, dt*8));
      cp.vy = lerp(cp.vy, ny*spd, min(1, dt*8));
      cp.facing = nx > 0.1 ? 1 : nx < -0.1 ? -1 : cp.facing;
      cp.state = 'moving';
    } else {
      cp.vx *= (1 - 8*dt);
      cp.vy *= (1 - 8*dt);
      cp.state = 'idle';
    }
    if (Input.pressed('Space') && cp.hasBall && Ball.state === 'held') { ShotSys.start(); }
    if (!Input.down('Space') && ShotSys.charging) {
      const power = ShotSys.release();
      if (power !== null && cp.hasBall) { initiateShot(cp, power); }
    }
    if (Input.pressed('KeyE') && cp.hasBall && Ball.state === 'held') {
      const target = AI.findPassTarget(cp);
      if (target) initiatePass(cp, target);
    }
    if (Input.pressed('KeyQ') && !cp.hasBall && !cp.firedOut) {
      const oppTeam = this.possession === 'home' ? this.away : this.home;
      for (const p of oppTeam) {
        if (p.hasBall && dist(cp.x,cp.y,p.x,p.y) < CFG.BASE_AI_STEAL_R) {
          if (random() < cp.stats.stealing / 180) {
            Ball.giveTo(cp);
            this.possession = cp.team;
            this.shotClock = CFG.SHOT_CLOCK;
            addFloat('STEAL', cp.x, cp.y-2, '#FFD700', 1);
          } else if (random() < CFG.FOUL_PROB_STEAL) {
            this.commitFoul(cp, p);
          }
          break;
        }
      }
    }
  },
};

// ------------------------------------------------------------
// HUD RENDERING (2D overlay canvas — screen-space chrome)
// ------------------------------------------------------------
function drawScoreboard() {
  const w = hud.width, h = sbH;
  const bgGrad = hctx.createLinearGradient(0, 0, 0, h);
  bgGrad.addColorStop(0, 'rgba(20,18,14,0.96)');
  bgGrad.addColorStop(1, CFG.UI_BG);
  hctx.fillStyle = bgGrad;
  hctx.fillRect(0, 0, w, h);
  hctx.fillStyle = 'rgba(255,255,255,0.06)';
  hctx.fillRect(0, 0, w, 1);
  hctx.fillStyle = CFG.UI_ACCENT;
  hctx.fillRect(0, h-2, w, 2);
  const cy = h/2;
  hctx.font = '700 28px Oswald';
  hctx.textAlign = 'right'; hctx.textBaseline = 'middle';
  hctx.shadowColor = CFG.HOME_C; hctx.shadowBlur = 10;
  hctx.fillStyle = CFG.HOME_C;
  hctx.fillText(Game.score.home, w*0.35, cy);
  hctx.shadowBlur = 0;
  hctx.font = '400 13px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText('AMBER', w*0.35 - 50, cy);
  hctx.font = '700 28px Oswald';
  hctx.textAlign = 'left';
  hctx.shadowColor = CFG.AWAY_C; hctx.shadowBlur = 10;
  hctx.fillStyle = CFG.AWAY_C;
  hctx.fillText(Game.score.away, w*0.65, cy);
  hctx.shadowBlur = 0;
  hctx.font = '400 13px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText('JADE', w*0.65 + 50, cy);
  hctx.strokeStyle = 'rgba(240,230,214,0.08)';
  hctx.lineWidth = 1;
  [w*0.44, w*0.56].forEach(x => { hctx.beginPath(); hctx.moveTo(x, h*0.18); hctx.lineTo(x, h*0.82); hctx.stroke(); });
  hctx.textAlign = 'center';
  hctx.font = '400 11px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText(`Q${Game.quarter}`, w/2, cy-12);
  hctx.font = '700 22px Oswald';
  hctx.fillStyle = CFG.UI_TEXT;
  const mins = floor(max(0,Game.quarterClock)/60);
  const secs = floor(max(0,Game.quarterClock)%60);
  hctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`, w/2, cy+8);
  const scColor = Game.shotClock <= 5 ? '#FF4444' : Game.shotClock <= 10 ? '#FFAA30' : CFG.UI_TEXT;
  const scPct = clamp(Game.shotClock / CFG.SHOT_CLOCK, 0, 1);
  const ringR = h * 0.24, ringCx = w/2 - 14, ringCy = cy + 26;
  hctx.strokeStyle = 'rgba(240,230,214,0.12)';
  hctx.lineWidth = 2.5;
  hctx.beginPath(); hctx.arc(ringCx, ringCy, ringR, 0, PI*2); hctx.stroke();
  hctx.strokeStyle = scColor;
  hctx.lineWidth = 2.5;
  hctx.beginPath(); hctx.arc(ringCx, ringCy, ringR, -PI/2, -PI/2 + scPct*PI*2); hctx.stroke();
  hctx.font = '700 16px Oswald';
  hctx.fillStyle = scColor;
  hctx.fillText(floor(max(0,Game.shotClock)).toString(), w/2, cy+26);
  hctx.font = '300 9px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText('SHOT', w/2 + 18, cy+26);
  const possX = Game.possession === 'home' ? w*0.35 + 8 : w*0.65 - 8;
  hctx.fillStyle = Game.possession === 'home' ? CFG.HOME_C : CFG.AWAY_C;
  hctx.beginPath(); hctx.arc(possX, cy, 4, 0, PI*2); hctx.fill();
  hctx.font = '300 10px "Source Sans 3"';
  hctx.textBaseline = 'middle';
  const homeBonus = Game.fouls.home >= CFG.TEAM_FOUL_BONUS;
  const awayBonus = Game.fouls.away >= CFG.TEAM_FOUL_BONUS;
  hctx.textAlign = 'right';
  hctx.fillStyle = homeBonus ? '#FF8844' : CFG.UI_DIM;
  hctx.fillText(`FOULS ${Game.fouls.home}${homeBonus ? ' BONUS' : ''}`, w*0.35, cy + h*0.32);
  hctx.textAlign = 'left';
  hctx.fillStyle = awayBonus ? '#FF8844' : CFG.UI_DIM;
  hctx.fillText(`FOULS ${Game.fouls.away}${awayBonus ? ' BONUS' : ''}`, w*0.65, cy + h*0.32);
}
function dimOverlay(alpha) {
  hctx.fillStyle = `rgba(10,10,8,${alpha})`;
  hctx.fillRect(0, 0, hud.width, hud.height);
}
function drawMenu() {
  dimOverlay(0.68);
  const cx = hud.width/2, cy = hud.height/2;
  hctx.font = '700 72px Oswald';
  hctx.textAlign = 'center'; hctx.textBaseline = 'middle';
  hctx.fillStyle = CFG.UI_ACCENT;
  hctx.fillText('HARDWOOD', cx, cy - 80);
  hctx.font = '300 16px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText('Basketball Simulation — 3D', cx, cy - 40);
  const pulse = 0.5 + sin(performance.now()*0.004)*0.5;
  hctx.globalAlpha = 0.5 + pulse*0.5;
  hctx.font = '600 20px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_TEXT;
  hctx.fillText('PRESS SPACE TO PLAY', cx, cy + 20);
  hctx.globalAlpha = 1;
  hctx.font = '300 13px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  const controls = [
    'ARROWS / WASD — Move',
    'SPACE (hold/release) — Shoot',
    'E — Pass', 'Q — Steal attempt', 'SHIFT — Sprint',
    'TAB — Switch player (defense)', 'R — Toggle Debug',
  ];
  controls.forEach((t,i) => hctx.fillText(t, cx, cy + 70 + i*22));
}
function drawDifficultySelect() {
  dimOverlay(0.75);
  const cx = hud.width/2, cy = hud.height/2 - 40;
  hctx.font = '700 52px Oswald';
  hctx.textAlign = 'center'; hctx.textBaseline = 'middle';
  hctx.fillStyle = CFG.UI_ACCENT;
  hctx.fillText('SELECT DIFFICULTY', cx, cy - 80);
  hctx.font = '400 18px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText('1 — EASY    2 — NORMAL    3 — HARD    4 — EXPERT', cx, cy + 20);
  hctx.font = '300 15px "Source Sans 3"';
  hctx.fillStyle = '#AAA';
  hctx.fillText('Current: ' + DIFFICULTIES[currentDifficulty].name, cx, cy + 55);
}
function drawFoulPause() {
  drawScoreboard();
  const cx = hud.width/2, cy = hud.height/2;
  hctx.font = '700 30px Oswald';
  hctx.textAlign = 'center'; hctx.textBaseline = 'middle';
  hctx.fillStyle = '#FF8844';
  hctx.fillText('FOUL', cx, cy - 10);
  hctx.font = '400 15px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  const teamName = Game.foulRetainTeam === 'home' ? 'AMBER' : 'JADE';
  hctx.fillText(`${teamName} BALL`, cx, cy + 18);
}
function drawFreeThrow() {
  drawScoreboard();
  const ft = Game.pendingFT;
  if (ft) {
    const cx = hud.width/2;
    hctx.font = '700 22px Oswald';
    hctx.textAlign = 'center'; hctx.textBaseline = 'middle';
    hctx.fillStyle = CFG.UI_ACCENT;
    hctx.fillText(`FREE THROW${ft.tripsLeft > 1 ? 'S' : ''}`, cx, sbH + 34);
    hctx.font = '400 14px "Source Sans 3"';
    hctx.fillStyle = CFG.UI_DIM;
    hctx.fillText(`#${ft.shooter.num} — ${ft.tripsLeft} remaining`, cx, sbH + 56);
  }
}
function drawTipoff() {
  drawScoreboard();
  const cx = hud.width/2, cy = hud.height/2;
  hctx.font = '700 36px Oswald';
  hctx.textAlign = 'center'; hctx.textBaseline = 'middle';
  hctx.fillStyle = CFG.UI_TEXT;
  hctx.fillText(`QUARTER ${Game.quarter}`, cx, cy);
}
function drawQuarterEnd() {
  drawScoreboard();
  const cx = hud.width/2, cy = hud.height/2;
  dimOverlay(0.45);
  hctx.font = '700 32px Oswald';
  hctx.textAlign = 'center'; hctx.textBaseline = 'middle';
  hctx.fillStyle = CFG.UI_TEXT;
  hctx.fillText('END OF QUARTER', cx, cy - 20);
  hctx.font = '400 22px Oswald';
  hctx.fillStyle = CFG.HOME_C;
  hctx.fillText(`${Game.score.home}`, cx - 50, cy + 20);
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText('-', cx, cy + 20);
  hctx.fillStyle = CFG.AWAY_C;
  hctx.fillText(`${Game.score.away}`, cx + 50, cy + 20);
}
function drawGameOver() {
  drawScoreboard();
  dimOverlay(0.6);
  const cx = hud.width/2, cy = hud.height/2;
  hctx.font = '700 48px Oswald';
  hctx.textAlign = 'center'; hctx.textBaseline = 'middle';
  hctx.fillStyle = CFG.UI_ACCENT;
  hctx.fillText('FINAL', cx, cy - 70);
  hctx.font = '700 64px Oswald';
  hctx.fillStyle = CFG.HOME_C;
  hctx.fillText(`${Game.score.home}`, cx - 70, cy + 5);
  hctx.fillStyle = CFG.UI_DIM;
  hctx.font = '400 40px Oswald';
  hctx.fillText('-', cx, cy + 5);
  hctx.font = '700 64px Oswald';
  hctx.fillStyle = CFG.AWAY_C;
  hctx.fillText(`${Game.score.away}`, cx + 70, cy + 5);
  const winner = Game.score.home > Game.score.away ? 'AMBER WINS' : Game.score.away > Game.score.home ? 'JADE WINS' : 'DRAW';
  hctx.font = '600 20px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_TEXT;
  hctx.fillText(winner, cx, cy + 55);
  const pulse = 0.5 + sin(performance.now()*0.004)*0.5;
  hctx.globalAlpha = 0.5 + pulse*0.5;
  hctx.font = '400 16px "Source Sans 3"';
  hctx.fillStyle = CFG.UI_DIM;
  hctx.fillText('PRESS SPACE TO PLAY AGAIN', cx, cy + 95);
  hctx.globalAlpha = 1;
}
function drawPlaying() {
  const cp = Game.getControlledPlayer();
  ShotSys.drawBar(cp);
  drawParticles();
  drawFloats();
  drawScoreboard();
  hctx.font = '300 11px "Source Sans 3"';
  hctx.fillStyle = 'rgba(240,230,214,0.35)';
  hctx.textAlign = 'center';
  hctx.fillText('ARROWS:Move  SPACE:Shoot  E:Pass  Q:Steal  SHIFT:Sprint  TAB:Switch  R:Debug', hud.width/2, hud.height - 10);
}

// ------------------------------------------------------------
// SCENE SYNC + RENDER
// ------------------------------------------------------------
function syncScene() {
  for (const p of Game.allPlayers()) updatePlayer3D(p);
  Ball.syncMesh();
}
function render() {
  syncScene();
  renderer.render(scene, camera);
  hctx.clearRect(0, 0, hud.width, hud.height);
  switch (Game.state) {
    case 'menu': drawScoreboard(); drawMenu(); break;
    case 'difficulty_select': drawScoreboard(); drawDifficultySelect(); break;
    case 'tipoff': drawTipoff(); break;
    case 'playing': drawPlaying(); break;
    case 'scored': drawPlaying(); break;
    case 'foul': drawFoulPause(); break;
    case 'freethrow': drawFreeThrow(); break;
    case 'quarter_end': drawQuarterEnd(); break;
    case 'game_over': drawGameOver(); break;
  }
}

// ------------------------------------------------------------
// GAME LOOP
// ------------------------------------------------------------
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  Game.update(dt);
  render();
  Input.flush();
  requestAnimationFrame(gameLoop);
}

// ------------------------------------------------------------
// INITIALIZATION
// ------------------------------------------------------------
function init() {
  Input.init();
  resize();
  Game.init();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
  Debug.log('Hardwood 3D — initialized');
}
init();
</script>
